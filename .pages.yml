# Pages CMS Configuration for tornike-tsiklauri.github.io
content:
  - label: "IT Projects"
    folder: "_posts" # Standard for Jekyll/GitHub Pages
    extension: "md"
    format: "yml-frontmatter"
    fields:
      - { label: "Project Title", name: "title", type: "string" }
      - { label: "Date", name: "date", type: "datetime" }
      - { label: "Category", name: "category", type: "select", options: ["SysAdmin", "IT Support", "Networking", "Hardware"] }
      - { label: "Project Details (Markdown)", name: "body", type: "markdown" }

  - label: "Technical Wiki / Knowledge Base"
    folder: "_wiki"
    extension: "md"
    fields:
      - { label: "Problem/Solution Title", name: "title", type: "string" }
      - { label: "Steps taken", name: "body", type: "markdown" }

  - label: "Site Settings"
    file: "_config.yml"
    fields:
      - { label: "Portfolio Name", name: "title", type: "string" }
      - { label: "Description", name: "description", type: "text" }